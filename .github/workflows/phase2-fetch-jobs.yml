name: Fetch Jobs
on: workflow_dispatch
jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/merge-main-search-match-xQtG0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install modal uv
      - run: cd pipeline && uv sync
      - run: cd pipeline && modal run src/modal_app.py::fetch_free_apis
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
