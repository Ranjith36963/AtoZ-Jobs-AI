name: Deploy to Cloudflare Workers
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - preview

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Build Next.js
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Build for Cloudflare
        run: pnpm exec opennextjs-cloudflare build

      - name: Deploy to Cloudflare Workers
        # OpenNext for Cloudflare targets Workers (not Pages).
        # node:sqlite is resolved via [alias] in wrangler.toml
        # (maps to esbuild alias), no sed patch needed.
        run: |
          pnpm exec wrangler deploy 2>&1 | tee /tmp/deploy-output.txt
          echo "---"
          echo "Deploy output above. Look for the Workers URL (https://atozjobs.<subdomain>.workers.dev)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify deployment
        run: |
          # Extract the deployed URL from wrangler output
          DEPLOY_URL=$(grep -oP 'https://[^\s]+\.workers\.dev' /tmp/deploy-output.txt | head -1 || true)
          if [ -n "$DEPLOY_URL" ]; then
            echo "Deployed to: $DEPLOY_URL"
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL" || true)
            echo "Homepage HTTP status: $HTTP_CODE"
          else
            echo "Warning: Could not extract Workers URL from deploy output"
            echo "Check the deploy step output for the live URL"
          fi
