name: Deploy to Cloudflare
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - preview

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Build Next.js
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Build and deploy via OpenNext
        # Use opennextjs-cloudflare CLI (not raw wrangler deploy) to handle
        # cache population and skew protection before deployment.
        run: |
          pnpm exec opennextjs-cloudflare build
          pnpm exec opennextjs-cloudflare deploy 2>&1 | tee /tmp/deploy-output.txt
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify deployment
        run: |
          # Extract the deployed URL from output
          DEPLOY_URL=$(grep -oP 'https://[^\s]+\.(workers|pages)\.dev' /tmp/deploy-output.txt | head -1 || true)
          if [ -n "$DEPLOY_URL" ]; then
            echo "Deployed to: $DEPLOY_URL"
            sleep 5
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL" || true)
            echo "Homepage HTTP status: $HTTP_CODE"
            if [ "$HTTP_CODE" != "200" ]; then
              echo "::warning::Homepage returned HTTP $HTTP_CODE (expected 200)"
            fi
          else
            echo "Warning: Could not extract URL from deploy output"
            echo "Check the deploy step output for the live URL"
          fi
