name: Lighthouse CI
on:
  workflow_dispatch:
    inputs:
      site_url:
        description: 'Base URL of the deployed site (e.g. https://atozjobs.pages.dev)'
        required: true
        type: string

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/plan-nextjs-frontend-KSU0h

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse — Homepage
        run: |
          lhci collect --url="${{ inputs.site_url }}/" --numberOfRuns=3
          lhci assert --preset=lighthouse:recommended \
            --assert.assertions.categories:performance=off \
            --assert.assertions.categories:accessibility=off
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}

      - name: Run Lighthouse — Search
        run: |
          lhci collect --url="${{ inputs.site_url }}/search?q=developer" --numberOfRuns=3

      - name: Run Lighthouse — Job Detail
        run: |
          lhci collect --url="${{ inputs.site_url }}/jobs/1" --numberOfRuns=3

      - name: Run Lighthouse — Transparency
        run: |
          lhci collect --url="${{ inputs.site_url }}/transparency" --numberOfRuns=3

      - name: Assert Performance and Accessibility
        run: |
          lhci assert \
            --assert.assertions.categories:performance=error \
            --assert.assertions.categories:performance.minScore=0.9 \
            --assert.assertions.categories:accessibility=error \
            --assert.assertions.categories:accessibility.minScore=0.95

      - name: Upload Results
        if: always()
        run: |
          lhci upload --target=filesystem --outputDir=./lighthouse-results

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: lighthouse-results/
          retention-days: 30
