name = "atozjobs"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"
minify = true

# node:sqlite (from undici's sqlite-cache-store) is not available in the workerd
# runtime.  The webpack/turbopack aliases in next.config.ts handle the Next.js
# build, but wrangler's own esbuild pass needs this alias too.
[alias]
"node:sqlite" = "./shims/node-sqlite.mjs"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
# Non-secret environment variables can go here
# Secrets must be set via: wrangler secret put <KEY>
