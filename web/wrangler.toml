name = "atozjobs"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"

# node:sqlite (from undici's sqlite-cache-store) is excluded via
# webpack resolve.alias in next.config.ts — not available in workerd runtime.

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
# Non-secret environment variables can go here
# Secrets must be set via: wrangler secret put <KEY>
